name: Publish ImgSeeder

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Validate tag matches csproj version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CSPROJ_VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" iorg.csproj)
          echo "Tag version: ${TAG_VERSION}"
          echo "Project version: ${CSPROJ_VERSION}"
          if [[ "${TAG_VERSION}" != "${CSPROJ_VERSION}" ]]; then
            echo "Tag version does not match iorg.csproj <Version>."
            exit 1
          fi

      - name: Restore
        run: dotnet restore iorg.slnx /p:UseLocalRAIkeepSources=false

      - name: Build
        run: dotnet build iorg.slnx --configuration Release --no-restore /p:UseLocalRAIkeepSources=false

      - name: Pack
        run: dotnet pack iorg.csproj --configuration Release --no-build /p:UseLocalRAIkeepSources=false

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: Burkhardt

      - name: Publish to NuGet
        run: |
          dotnet nuget push "artifacts/nuget/*.nupkg" \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

  build-self-contained:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        rid:
          - linux-x64
          - osx-arm64
          - osx-x64
          - win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Validate tag matches csproj version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CSPROJ_VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" iorg.csproj)
          echo "Tag version: ${TAG_VERSION}"
          echo "Project version: ${CSPROJ_VERSION}"
          if [[ "${TAG_VERSION}" != "${CSPROJ_VERSION}" ]]; then
            echo "Tag version does not match iorg.csproj <Version>."
            exit 1
          fi

      - name: Publish self-contained binary
        shell: bash
        run: |
          dotnet publish iorg.csproj \
            --configuration Release \
            --runtime "${{ matrix.rid }}" \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:UseLocalRAIkeepSources=false \
            --output "artifacts/publish/${{ matrix.rid }}"

      - name: Archive self-contained binary
        shell: bash
        run: |
          mkdir -p artifacts/release
          VERSION="${GITHUB_REF_NAME:-manual}-${{ matrix.rid }}"
          cd artifacts/publish
          zip -r "../release/iorg-${VERSION}.zip" "${{ matrix.rid }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: iorg-${{ matrix.rid }}
          path: artifacts/release/iorg-*.zip

  publish-self-contained-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-self-contained
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download self-contained artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/release

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES_FILE="RELEASE_NOTES_${VERSION}.md"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${TAG} already exists."
          elif [[ -f "${NOTES_FILE}" ]]; then
            gh release create "${TAG}" --title "ImgSeeder ${VERSION}" --notes-file "${NOTES_FILE}"
          else
            gh release create "${TAG}" --title "ImgSeeder ${VERSION}" --notes "ImgSeeder ${VERSION} self-contained iorg binaries."
          fi

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          find artifacts/release -name '*.zip' -print0 \
            | xargs -0 -I {} gh release upload "${GITHUB_REF_NAME}" "{}" --clobber
